<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - TalkKindly</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --accent: #e74c3c;
            --success: #27ae60;
            --warning: #f39c12;
            --light: #ecf0f1;
            --dark: #2c3e50;
            --gray: #7f8c8d;
            --white: #ffffff;
            --admin: #9b59b6;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--admin) 0%, #8e44ad 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        .admin-header {
            background: linear-gradient(135deg, var(--admin), #8e44ad);
            color: var(--white);
            padding: 30px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .admin-header h1 {
            font-size: 2.5em;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .back-btn {
            background: rgba(255,255,255,0.2);
            color: var(--white);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        
        .admin-nav {
            background: var(--white);
            border-bottom: 2px solid var(--light);
            padding: 0 40px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .admin-tab {
            padding: 20px 30px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            color: var(--gray);
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }
        
        .admin-tab.active {
            color: var(--admin);
            border-bottom-color: var(--admin);
        }
        
        .admin-tab:hover {
            color: var(--primary);
            background: var(--light);
        }
        
        .admin-content {
            padding: 40px;
        }
        
        .tab-pane {
            display: none;
        }
        
        .tab-pane.active {
            display: block;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: var(--white);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            border-left: 5px solid var(--admin);
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        
        .stat-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }
        
        .stat-value {
            font-size: 2.5em;
            font-weight: 700;
            color: var(--admin);
            margin-bottom: 5px;
        }
        
        .stat-label {
            color: var(--gray);
            font-size: 0.95em;
        }
        
        .card {
            background: var(--white);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }
        
        .card h3 {
            margin-bottom: 20px;
            color: var(--admin);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid var(--light);
        }
        
        th {
            background: var(--light);
            font-weight: 600;
            color: var(--dark);
        }
        
        tr:hover {
            background: rgba(155, 89, 182, 0.05);
        }
        
        .btn {
            background: linear-gradient(135deg, var(--secondary), #2980b9);
            color: var(--white);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
        }
        
        .btn-sm {
            padding: 6px 12px;
            font-size: 13px;
        }
        
        .btn-danger {
            background: linear-gradient(135deg, var(--accent), #c0392b);
        }
        
        .btn-success {
            background: linear-gradient(135deg, var(--success), #229954);
        }
        
        .btn-warning {
            background: linear-gradient(135deg, var(--warning), #e67e22);
        }
        
        .btn-admin {
            background: linear-gradient(135deg, var(--admin), #8e44ad);
        }
        
        .badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .badge-admin {
            background: var(--admin);
            color: var(--white);
        }
        
        .badge-user {
            background: var(--secondary);
            color: var(--white);
        }
        
        .badge-active {
            background: var(--success);
            color: var(--white);
        }
        
        .badge-inactive {
            background: var(--gray);
            color: var(--white);
        }
        
        .badge-offensive {
            background: var(--accent);
            color: var(--white);
        }
        
        .badge-safe {
            background: var(--success);
            color: var(--white);
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--dark);
        }
        
        .input-group input,
        .input-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--light);
            border-radius: 8px;
            font-size: 14px;
        }
        
        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: var(--admin);
        }
        
        .loading {
            text-align: center;
            padding: 40px;
        }
        
        .spinner {
            border: 4px solid var(--light);
            border-top: 4px solid var(--admin);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .word-item {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--light);
            padding: 8px 15px;
            border-radius: 20px;
            margin: 5px;
        }
        
        .word-category {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 10px;
            background: var(--white);
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: var(--white);
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            width: 90%;
        }
        
        .activity-item {
            padding: 15px;
            border-left: 4px solid var(--admin);
            background: var(--light);
            margin-bottom: 10px;
            border-radius: 8px;
        }
        
        .filter-bar {
            background: var(--light);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .filter-bar input,
        .filter-bar select {
            padding: 10px 15px;
            border: 2px solid var(--white);
            border-radius: 8px;
            font-size: 14px;
            background: var(--white);
        }
        
        .filter-bar input:focus,
        .filter-bar select:focus {
            outline: none;
            border-color: var(--admin);
        }
        
        @media (max-width: 768px) {
            .admin-header {
                flex-direction: column;
                gap: 20px;
                text-align: center;
            }
            
            .admin-nav {
                flex-direction: column;
                padding: 0;
            }
            
            .admin-tab {
                justify-content: center;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .filter-bar {
                flex-direction: column;
            }
            
            .filter-bar input,
            .filter-bar select {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="admin-header">
            <h1>👑 Admin Panel</h1>
            <a href="/" class="back-btn">← Back to Dashboard</a>
        </div>
        
        <div class="admin-nav">
            <button class="admin-tab active" onclick="switchTab('overview')">📊 Overview</button>
            <button class="admin-tab" onclick="switchTab('users')">👥 Users</button>
            <button class="admin-tab" onclick="switchTab('analyses')">📋 All Analyses</button>
            <button class="admin-tab" onclick="switchTab('words')">🚫 Offensive Words</button>
            <button class="admin-tab" onclick="switchTab('activity')">📜 Activity Log</button>
        </div>
        
        <div class="admin-content">
            <!-- Overview Tab -->
            <div id="overview" class="tab-pane active">
                <div class="stats-grid" id="overviewStats">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Loading statistics...</p>
                    </div>
                </div>
                
                <div class="card">
                    <h3>📈 System Analytics</h3>
                    <canvas id="systemChart" height="100"></canvas>
                </div>
            </div>
            
            <!-- Users Tab -->
            <div id="users" class="tab-pane">
                <div class="card">
                    <h3>👥 User Management</h3>
                    <div id="usersTable">
                        <div class="loading">
                            <div class="spinner"></div>
                            <p>Loading users...</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- All Analyses Tab -->
            <div id="analyses" class="tab-pane">
                <div class="card">
                    <h3>📋 All Users Analyses</h3>
                    
                    <div class="filter-bar">
                        <input type="text" id="analysisSearch" placeholder="🔍 Search in analyses..." style="flex: 1;">
                        <select id="analysisTypeFilter">
                            <option value="all">All Types</option>
                            <option value="text">Text Only</option>
                            <option value="file">Files Only</option>
                        </select>
                        <button class="btn btn-sm" onclick="loadAllAnalyses()">
                            <span>🔍</span> Filter
                        </button>
                        <button class="btn btn-sm btn-warning" onclick="resetAnalysisFilters()">
                            <span>🔄</span> Reset
                        </button>
                    </div>
                    
                    <div id="allAnalysesTable">
                        <div class="loading">
                            <div class="spinner"></div>
                            <p>Loading analyses...</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Offensive Words Tab -->
            <div id="words" class="tab-pane">
                <div class="card">
                    <h3>🚫 Offensive Words Manager</h3>
                    
                    <div style="margin-bottom: 30px;">
                        <button class="btn btn-admin" onclick="showAddWordModal()">
                            ➕ Add New Word
                        </button>
                    </div>
                    
                    <div id="wordsContainer">
                        <div class="loading">
                            <div class="spinner"></div>
                            <p>Loading words...</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Activity Log Tab -->
            <div id="activity" class="tab-pane">
                <div class="card">
                    <h3>📜 Recent Activity</h3>
                    <div id="activityLog">
                        <div class="loading">
                            <div class="spinner"></div>
                            <p>Loading activity...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Add Word Modal -->
    <div id="addWordModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 20px;">➕ Add Offensive Word</h3>
            <form id="addWordForm">
                <div class="input-group">
                    <label>Word</label>
                    <input type="text" id="newWord" placeholder="Enter word" required>
                </div>
                <div class="input-group">
                    <label>Category</label>
                    <select id="newWordCategory">
                        <option value="mild">Mild</option>
                        <option value="moderate">Moderate</option>
                        <option value="strong">Strong</option>
                    </select>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="submit" class="btn btn-success">Add Word</button>
                    <button type="button" class="btn btn-danger" onclick="closeAddWordModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
    let systemChart = null;
    
    window.addEventListener('load', function() {
        loadOverview();
    });
    
    function switchTab(tabId) {
        document.querySelectorAll('.tab-pane').forEach(pane => {
            pane.classList.remove('active');
        });
        document.querySelectorAll('.admin-tab').forEach(tab => {
            tab.classList.remove('active');
        });
        
        document.getElementById(tabId).classList.add('active');
        event.target.classList.add('active');
        
        if (tabId === 'overview') {
            loadOverview();
        } else if (tabId === 'users') {
            loadUsers();
        } else if (tabId === 'analyses') {
            loadAllAnalyses();
        } else if (tabId === 'words') {
            loadWords();
        } else if (tabId === 'activity') {
            loadActivity();
        }
    }
    
    async function loadOverview() {
        try {
            const response = await fetch('/api/admin/statistics');
            if (!response.ok) {
                throw new Error('Failed to load statistics');
            }
            const stats = await response.json();
            
            document.getElementById('overviewStats').innerHTML = `
                <div class="stat-card">
                    <div class="stat-icon">👥</div>
                    <div class="stat-value">${stats.total_users || 0}</div>
                    <div class="stat-label">Total Users</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📊</div>
                    <div class="stat-value">${stats.total_analyses || 0}</div>
                    <div class="stat-label">Total Analyses</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🚫</div>
                    <div class="stat-value">${stats.offensive_analyses || 0}</div>
                    <div class="stat-label">Offensive Content</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">✅</div>
                    <div class="stat-value">${stats.safe_analyses || 0}</div>
                    <div class="stat-label">Safe Content</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🔥</div>
                    <div class="stat-value">${stats.today_analyses || 0}</div>
                    <div class="stat-label">Today's Analyses</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📝</div>
                    <div class="stat-value">${stats.offensive_words_count || 0}</div>
                    <div class="stat-label">Offensive Words</div>
                </div>
            `;
            
            drawSystemChart(stats);
        } catch (error) {
            console.error('Error loading overview:', error);
            document.getElementById('overviewStats').innerHTML = `
                <div class="loading">❌ Error loading statistics: ${error.message}</div>
            `;
        }
    }
    
    function drawSystemChart(stats) {
        const ctx = document.getElementById('systemChart');
        if (!ctx) return;
        
        if (systemChart) {
            systemChart.destroy();
        }
        
        systemChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Total Analyses', 'Offensive', 'Safe', 'Today'],
                datasets: [{
                    label: 'System Statistics',
                    data: [
                        stats.total_analyses || 0,
                        stats.offensive_analyses || 0,
                        stats.safe_analyses || 0,
                        stats.today_analyses || 0
                    ],
                    backgroundColor: [
                        '#9b59b6',
                        '#e74c3c',
                        '#27ae60',
                        '#3498db'
                    ]
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    }
    
    async function loadUsers() {
        try {
            const response = await fetch('/api/admin/users');
            if (!response.ok) {
                throw new Error('Failed to load users');
            }
            const users = await response.json();
            
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Username</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Analyses</th>
                            <th>Offensive</th>
                            <th>Joined</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            users.forEach(user => {
                html += `
                    <tr>
                        <td>${user.id}</td>
                        <td>${user.username}</td>
                        <td>${user.email}</td>
                        <td>
                            <span class="badge ${user.is_admin ? 'badge-admin' : 'badge-user'}">
                                ${user.is_admin ? '👑 Admin' : '👤 User'}
                            </span>
                        </td>
                        <td>
                            <span class="badge ${user.is_active ? 'badge-active' : 'badge-inactive'}">
                                ${user.is_active ? 'Active' : 'Disabled'}
                            </span>
                        </td>
                        <td>${user.total_analyses || 0}</td>
                        <td>${user.offensive_analyses || 0}</td>
                        <td>${new Date(user.created_at).toLocaleDateString()}</td>
                        <td>
                            <button class="btn btn-sm btn-warning" onclick="toggleUser(${user.id})">
                                ${user.is_active ? 'Disable' : 'Enable'}
                            </button>
                            <button class="btn btn-sm btn-danger" onclick="deleteUser(${user.id}, '${user.username}')">
                                Delete
                            </button>
                        </td>
                    </tr>
                `;
            });
            
            html += `</tbody></table>`;
            document.getElementById('usersTable').innerHTML = html;
        } catch (error) {
            document.getElementById('usersTable').innerHTML = `
                <div class="loading">❌ Error loading users: ${error.message}</div>
            `;
        }
    }
    
    async function toggleUser(userId) {
        if (!confirm('Are you sure you want to toggle this user\'s status?')) return;
        
        try {
            const response = await fetch(`/api/admin/users/${userId}/toggle`, {
                method: 'POST'
            });
            
            if (response.ok) {
                alert('✅ User status updated');
                loadUsers();
            } else {
                const error = await response.json();
                alert('❌ ' + error.error);
            }
        } catch (error) {
            alert('❌ Error: ' + error.message);
        }
    }
    
    async function deleteUser(userId, username) {
        if (!confirm(`Are you sure you want to delete user "${username}"? This action cannot be undone!`)) return;
        
        try {
            const response = await fetch(`/api/admin/users/${userId}`, {
                method: 'DELETE'
            });
            
            if (response.ok) {
                alert('✅ User deleted successfully');
                loadUsers();
            } else {
                const error = await response.json();
                alert('❌ ' + error.error);
            }
        } catch (error) {
            alert('❌ Error: ' + error.message);
        }
    }
    
    async function loadAllAnalyses() {
        try {
            const searchQuery = document.getElementById('analysisSearch').value;
            const typeFilter = document.getElementById('analysisTypeFilter').value;
            
            let url = '/api/admin/analyses?';
            if (typeFilter !== 'all') url += `type=${typeFilter}&`;
            if (searchQuery) url += `search=${encodeURIComponent(searchQuery)}&`;
            
            const response = await fetch(url);
            if (!response.ok) {
                throw new Error('Failed to load analyses');
            }
            const analyses = await response.json();
            
            let html = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value">${analyses.length}</div>
                        <div class="stat-label">Total Analyses</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${analyses.filter(a => a.is_offensive).length}</div>
                        <div class="stat-label">Offensive</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${analyses.filter(a => !a.is_offensive).length}</div>
                        <div class="stat-label">Safe</div>
                    </div>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>User</th>
                            <th>Date</th>
                            <th>Type</th>
                            <th>Content</th>
                            <th>Status</th>
                            <th>Count</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            analyses.forEach(analysis => {
                const content = analysis.text_content 
                    ? (analysis.text_content.substring(0, 50) + (analysis.text_content.length > 50 ? '...' : ''))
                    : (analysis.filename || 'File analysis');
                
                html += `
                    <tr>
                        <td>${analysis.id}</td>
                        <td>
                            <span class="badge ${analysis.is_admin ? 'badge-admin' : 'badge-user'}">
                                ${analysis.username}
                            </span>
                        </td>
                        <td>${new Date(analysis.timestamp).toLocaleString()}</td>
                        <td>${analysis.analysis_type}</td>
                        <td title="${analysis.text_content || analysis.filename}">${content}</td>
                        <td>
                            <span class="badge ${analysis.is_offensive ? 'badge-offensive' : 'badge-safe'}">
                                ${analysis.is_offensive ? '🚫 Offensive' : '✅ Safe'}
                            </span>
                        </td>
                        <td>${analysis.offensive_count}</td>
                        <td>
                            <button class="btn btn-sm btn-danger" onclick="deleteAnalysis(${analysis.id})">
                                🗑️ Delete
                            </button>
                        </td>
                    </tr>
                `;
            });
            
            html += `</tbody></table>`;
            document.getElementById('allAnalysesTable').innerHTML = html;
        } catch (error) {
            document.getElementById('allAnalysesTable').innerHTML = `
                <div class="loading">❌ Error loading analyses: ${error.message}</div>
            `;
        }
    }
    
    async function deleteAnalysis(analysisId) {
        if (!confirm('Are you sure you want to delete this analysis? This action cannot be undone!')) return;
        
        try {
            const response = await fetch(`/api/admin/analyses/${analysisId}`, {
                method: 'DELETE'
            });
            
            if (response.ok) {
                alert('✅ Analysis deleted successfully');
                loadAllAnalyses();
            } else {
                const error = await response.json();
                alert('❌ ' + error.error);
            }
        } catch (error) {
            alert('❌ Error: ' + error.message);
        }
    }
    
    function resetAnalysisFilters() {
        document.getElementById('analysisSearch').value = '';
        document.getElementById('analysisTypeFilter').value = 'all';
        loadAllAnalyses();
    }
    
    async function loadWords() {
        try {
            const response = await fetch('/api/admin/words');
            if (!response.ok) {
                throw new Error('Failed to load words');
            }
            const words = await response.json();
            
            let html = '<div style="display: flex; flex-wrap: wrap; gap: 10px;">';
            
            words.forEach(word => {
                html += `
                    <div class="word-item">
                        <strong>${word.word}</strong>
                        <span class="word-category">${word.category}</span>
                        ${word.added_by_name ? `<small>by ${word.added_by_name}</small>` : ''}
                        <button class="btn btn-sm btn-danger" onclick="deleteWord(${word.id}, '${word.word}')" style="padding: 4px 8px;">
                            ❌
                        </button>
                    </div>
                `;
            });
            
            html += '</div>';
            document.getElementById('wordsContainer').innerHTML = html;
        } catch (error) {
            document.getElementById('wordsContainer').innerHTML = `
                <div class="loading">❌ Error loading words: ${error.message}</div>
            `;
        }
    }
    
    function showAddWordModal() {
        document.getElementById('addWordModal').classList.add('active');
    }
    
    function closeAddWordModal() {
        document.getElementById('addWordModal').classList.remove('active');
        document.getElementById('addWordForm').reset();
    }
    
    document.getElementById('addWordForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const word = document.getElementById('newWord').value.trim();
        const category = document.getElementById('newWordCategory').value;
        
        try {
            const response = await fetch('/api/admin/words', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ word, category })
            });
            
            const result = await response.json();
            
            if (response.ok) {
                alert('✅ ' + result.message);
                closeAddWordModal();
                loadWords();
            } else {
                alert('❌ ' + result.error);
            }
        } catch (error) {
            alert('❌ Error: ' + error.message);
        }
    });
    
    async function deleteWord(wordId, word) {
        if (!confirm(`Delete word "${word}"?`)) return;
        
        try {
            const response = await fetch(`/api/admin/words/${wordId}`, {
                method: 'DELETE'
            });
            
            if (response.ok) {
                alert('✅ Word deleted');
                loadWords();
            } else {
                alert('❌ Error deleting word');
            }
        } catch (error) {
            alert('❌ Error: ' + error.message);
        }
    }
    
    async function loadActivity() {
        try {
            const response = await fetch('/api/admin/activity?limit=50');
            if (!response.ok) {
                throw new Error('Failed to load activity');
            }
            const activities = await response.json();
            
            let html = '';
            
            activities.forEach(activity => {
                let details = '';
                try {
                    const parsed = JSON.parse(activity.details);
                    details = JSON.stringify(parsed, null, 2);
                } catch (e) {
                    details = activity.details || '';
                }
                
                html += `
                    <div class="activity-item">
                        <strong>${activity.username}</strong> - ${activity.action}
                        <div style="font-size: 0.9em; color: var(--gray); margin-top: 5px;">
                            ${new Date(activity.timestamp).toLocaleString()}
                            ${activity.ip_address ? ` • IP: ${activity.ip_address}` : ''}
                        </div>
                        ${details ? `<pre style="font-size: 0.8em; margin-top: 10px; background: var(--light); padding: 10px; border-radius: 5px; overflow-x: auto;">${details}</pre>` : ''}
                    </div>
                `;
            });
            
            document.getElementById('activityLog').innerHTML = html || '<p>No activity logged yet.</p>';
        } catch (error) {
            document.getElementById('activityLog').innerHTML = `
                <div class="loading">❌ Error loading activity: ${error.message}</div>
            `;
        }
    }
    </script>
</body>
</html>
